<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Elvestad Massemottak Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #fff; 
            font-family: 'IBM Plex Mono', monospace; 
        }
        #network-container { 
            width: 100%; height: calc(100vh - 40px); 
            display: block; position: relative; 
            margin-top: 40px; 
        }
        
        /* --- SINGLE LINE LEGEND --- */
        #single-line-legend {
            position: fixed; top: 0; left: 0; width: 100%; height: 40px;
            background: rgba(255,255,255,0.95); z-index: 10;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #000; padding: 0 10px; 
            border-bottom: 1px solid #eee; box-sizing: border-box;
            gap: 20px; flex-wrap: nowrap; overflow-x: auto; white-space: nowrap;
        }
        
        .legend-section { display: flex; align-items: center; gap: 10px; }
        .legend-divider { width: 1px; height: 20px; background: #ccc; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-title { font-weight: 600; text-transform: uppercase; margin-right: 5px; }
    </style>
</head>
<body>

<div id="single-line-legend">
    <div class="legend-section">
        <div class="legend-item"><svg width="12" height="12"><rect width="12" height="12" fill="#000"/></svg> Konsern</div>
        <div class="legend-item"><svg width="12" height="12"><polygon points="0,12 6,0 12,12" fill="#666"/></svg> Divisjon (Ind)</div>
        <div class="legend-item"><svg width="12" height="12"><polygon points="0,12 6,0 12,12" fill="none" stroke="#666" stroke-width="1.5"/></svg> Divisjon (Ent)</div>
        <div class="legend-item"><svg width="12" height="12"><rect x="1" y="1" width="10" height="10" fill="none" stroke="#666" stroke-width="1.5"/></svg> Søsteravd.</div>
    </div>
    
    <div class="legend-divider"></div>
    
    <div class="legend-section">
        <span class="legend-title">Construction:</span>
        <div class="legend-item">
            <svg width="14" height="14"><rect x="1" y="1" width="12" height="12" fill="none" stroke="#ff003c" stroke-width="1.5"/><path d="M1,1 L13,1 L1,13 Z" fill="#000"/></svg> Producing
        </div>
        <div class="legend-item">
            <svg width="14" height="14"><rect x="1" y="1" width="12" height="12" fill="none" stroke="#ff003c" stroke-width="1.5"/><path d="M13,13 L1,13 L13,1 Z" fill="#000"/></svg> Receiving
        </div>
        <div class="legend-item">
            <svg width="14" height="14"><rect x="1" y="1" width="12" height="12" fill="none" stroke="#ff003c" stroke-width="1.5"/><path d="M1,1 L13,1 L7,7 Z" fill="#000"/><path d="M1,13 L13,13 L7,7 Z" fill="#000"/></svg> Mixed
        </div>
    </div>

    <div class="legend-divider"></div>
    
    <div class="legend-section">
        <span class="legend-title">Facility:</span>
        <div class="legend-item">
            <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="none" stroke="#39ff14" stroke-width="1.5"/><path d="M1,7 A6,6 0 0,1 13,7 Z" fill="#000"/></svg> Producing
        </div>
        <div class="legend-item">
            <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="none" stroke="#39ff14" stroke-width="1.5"/><path d="M1,7 A6,6 0 0,0 13,7 Z" fill="#000"/></svg> Receiving
        </div>
        <div class="legend-item">
            <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="none" stroke="#39ff14" stroke-width="1.5"/><path d="M7,7 L1,7 A6,6 0 0,1 7,1 Z M7,7 L13,7 A6,6 0 0,1 7,13 Z" fill="#000"/></svg> Mixed
        </div>
    </div>
</div>

<div id="network-container"></div>

<script>
(function(){
    var NODES = [
        // CORPORATE (Black/Grey Shapes)
        {id:"Veidekke ASA", cargo_type:"parent", cargo_sub:"parent"},
        {id:"Veidekke Industri AS", cargo_type:"parent", cargo_sub:"division_industri"},
        {id:"Veidekke Entreprenør AS", l:"(Bygg)", cargo_type:"parent", cargo_sub:"division_entreprenør"},
        {id:"Geomaterialer", l:"(Avdeling)", cargo_type:"parent", cargo_sub:"dept"}, 
        {id:"Asfalt", cargo_type:"parent", cargo_sub:"dept"},
        {id:"Pukk og Grus", cargo_type:"parent", cargo_sub:"dept"},
        
        // FACILITIES (Green Circles)
        {id:"Elvestad Massemottak", cargo_type:"facility", cargo_sub:"mixed", active:true},
        {id:"Veidekke Gardermoen", cargo_type:"facility", cargo_sub:"receiving"}, // Massemottak = Receiving
        {id:"Alnabru Massemottak", cargo_type:"facility", cargo_sub:"receiving"}, // Massemottak = Receiving
        {id:"Gran Pukkverk", cargo_type:"facility", cargo_sub:"producing"}, // Pukkverk = Producing
        {id:"Rambydalen Pukkverk", cargo_type:"facility", cargo_sub:"producing"}, // Pukkverk = Producing
        {id:"Veidekke Sirkulær AS", l:"(Avfall)", cargo_type:"facility", cargo_sub:"mixed"},

        // CONSTRUCTION/PROJECTS (Pink Squares)
        {id:"Amrock AS", l:"(Stein)", cargo_type:"construction", cargo_sub:"producing"},
        {id:"Kystmiljø AS", cargo_type:"construction", cargo_sub:"mixed"}
    ];
    
    var LINKS = [
        ["Geomaterialer", "Veidekke Industri AS"],
        ["Asfalt", "Veidekke Industri AS"],
        ["Pukk og Grus", "Veidekke Industri AS"],
        ["Veidekke Industri AS", "Veidekke ASA"],
        ["Veidekke Entreprenør AS", "Veidekke ASA"],
        ["Elvestad Massemottak", "Geomaterialer"], 
        ["Veidekke Gardermoen", "Geomaterialer"],
        ["Alnabru Massemottak", "Geomaterialer"],
        ["Gran Pukkverk", "Geomaterialer"],
        ["Rambydalen Pukkverk", "Geomaterialer"],
        ["Veidekke Sirkulær AS", "Veidekke Entreprenør AS"],
        ["Amrock AS", "Veidekke ASA"], 
        ["Kystmiljø AS", "Veidekke ASA"] 
    ];

    var el = document.getElementById("network-container");
    var W, H, svg, nodes=[], links=[], parentMap={}, childrenMap={};

    function createIcon(node) {
        var ns = "http://www.w3.org/2000/svg";
        var g = document.createElementNS(ns, "g");
        var size = 8; // Base radius/half-width for bigger icons

        if (node.cargo_type === 'parent') {
            if (node.cargo_sub === 'parent') {
                var r = document.createElementNS(ns, "rect");
                r.setAttribute("x", -size); r.setAttribute("y", -size);
                r.setAttribute("width", size*2); r.setAttribute("height", size*2);
                r.setAttribute("fill", "#000");
                g.appendChild(r);
            } else if (node.cargo_sub === 'division_industri') {
                var p = document.createElementNS(ns, "polygon");
                p.setAttribute("points", `0,-${size} ${size},${size} -${size},${size}`);
                p.setAttribute("fill", "#666");
                g.appendChild(p);
            } else if (node.cargo_sub === 'division_entreprenør') {
                var p = document.createElementNS(ns, "polygon");
                p.setAttribute("points", `0,-${size} ${size},${size} -${size},${size}`);
                p.setAttribute("fill", "none");
                p.setAttribute("stroke", "#666"); p.setAttribute("stroke-width", "1.5");
                g.appendChild(p);
            } else { 
                var r = document.createElementNS(ns, "rect");
                r.setAttribute("x", -size+1); r.setAttribute("y", -size+1);
                r.setAttribute("width", (size*2)-2); r.setAttribute("height", (size*2)-2);
                r.setAttribute("fill", "none");
                r.setAttribute("stroke", "#666"); r.setAttribute("stroke-width", "1.5");
                g.appendChild(r);
            }
        } 
        else if (node.cargo_type === 'construction') {
            var r = document.createElementNS(ns, "rect");
            r.setAttribute("x", -size); r.setAttribute("y", -size);
            r.setAttribute("width", size*2); r.setAttribute("height", size*2);
            r.setAttribute("fill", "none");
            r.setAttribute("stroke", "#ff003c"); r.setAttribute("stroke-width", "1.5");
            g.appendChild(r);

            var path = document.createElementNS(ns, "path");
            path.setAttribute("fill", "#000");
            if (node.cargo_sub === 'producing') {
                path.setAttribute("d", `M-${size},-${size} L${size},-${size} L-${size},${size} Z`);
            } else if (node.cargo_sub === 'receiving') {
                path.setAttribute("d", `M${size},${size} L-${size},${size} L${size},-${size} Z`);
            } else if (node.cargo_sub === 'mixed') {
                path.setAttribute("d", `M-${size},-${size} L${size},-${size} L0,0 Z M-${size},${size} L${size},${size} L0,0 Z`);
            }
            g.appendChild(path);
        }
        else if (node.cargo_type === 'facility') {
            var c = document.createElementNS(ns, "circle");
            c.setAttribute("r", size);
            c.setAttribute("fill", "none");
            c.setAttribute("stroke", "#39ff14"); c.setAttribute("stroke-width", "1.5");
            g.appendChild(c);

            var path = document.createElementNS(ns, "path");
            path.setAttribute("fill", "#000");
            if (node.cargo_sub === 'producing') {
                path.setAttribute("d", `M-${size},0 A${size},${size} 0 0,1 ${size},0 Z`);
            } else if (node.cargo_sub === 'receiving') {
                path.setAttribute("d", `M-${size},0 A${size},${size} 0 0,0 ${size},0 Z`);
            } else if (node.cargo_sub === 'mixed') {
                path.setAttribute("d", `M0,0 L-${size},0 A${size},${size} 0 0,1 0,-${size} Z M0,0 L${size},0 A${size},${size} 0 0,1 0,${size} Z`);
            }
            g.appendChild(path);
        }

        if(node.active) g.setAttribute("transform", "scale(1.3)");
        return g;
    }

    function init() {
        if(!el) return;
        
        W = el.offsetWidth; H = el.offsetHeight;
        el.innerHTML = "";
        var ns = "http://www.w3.org/2000/svg";
        svg = document.createElementNS(ns, "svg");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", "100%");
        el.appendChild(svg);

        window.addEventListener('resize', function() {
            W = el.offsetWidth; H = el.offsetHeight;
        });

        nodes = NODES.map(d => ({
            id: d.id, l: d.l, active: d.active, 
            cargo_type: d.cargo_type, cargo_sub: d.cargo_sub,
            x: W/2 + (Math.random()-0.5)*200,
            y: H/2 + (Math.random()-0.5)*200,
            vx: 0, vy: 0
        }));

        links = [];
        LINKS.forEach(pair => {
            var s = nodes.find(n=>n.id===pair[0]);
            var t = nodes.find(n=>n.id===pair[1]);
            if(s && t) links.push({s:s, t:t});
        });

        var linkG = document.createElementNS(ns, "g");
        svg.appendChild(linkG);
        links.forEach(l => {
            var line = document.createElementNS(ns, "line");
            line.setAttribute("stroke", "#ddd");
            line.setAttribute("stroke-width", "0.6");
            linkG.appendChild(line);
            l.el = line;
        });

        var nodeG = document.createElementNS(ns, "g");
        svg.appendChild(nodeG);

        nodes.forEach(n => {
            var g = document.createElementNS(ns, "g");
            g.style.cursor = "pointer";
            
            if (n.active) {
                var ring = document.createElementNS(ns, "circle");
                ring.setAttribute("r", 18);
                ring.setAttribute("fill", "none");
                ring.setAttribute("stroke", "#000");
                ring.setAttribute("stroke-dasharray", "3,3");
                g.appendChild(ring);
            }

            var hit = document.createElementNS(ns, "circle");
            hit.setAttribute("r", 20); hit.setAttribute("fill", "transparent");
            g.appendChild(hit);

            var shape = createIcon(n);
            g.appendChild(shape);
            n.shapeEl = shape;

            var txt = document.createElementNS(ns, "text");
            var textContent = n.id + (n.l ? " " + n.l : "");
            txt.textContent = textContent;
            txt.setAttribute("x", 12); txt.setAttribute("y", 3);
            txt.setAttribute("fill", n.active ? "#000" : "#666"); 
            txt.style.font = n.active ? "600 11px 'IBM Plex Mono', monospace" : "400 10px 'IBM Plex Mono', monospace"; 
            txt.style.pointerEvents = "none";
            g.appendChild(txt);
            n.tEl = txt;

            g.onmousedown = function(e){ e.preventDefault(); n.dragging = true; };
            nodeG.appendChild(g);
            n.el = g;
        });

        window.addEventListener("mousemove", function(e){
            nodes.forEach(n => {
                if(n.dragging) {
                    var rect = svg.getBoundingClientRect();
                    n.x = e.clientX - rect.left;
                    n.y = e.clientY - rect.top;
                    n.vx = 0; n.vy = 0;
                }
            });
        });
        window.addEventListener("mouseup", function(){ nodes.forEach(n => n.dragging = false); });

        requestAnimationFrame(tick);
    }

    function tick() {
        links.forEach(l => {
            var dx = l.t.x - l.s.x; var dy = l.t.y - l.s.y;
            var dist = Math.sqrt(dx*dx + dy*dy) || 1;
            var restLen = 80; // Spread nodes out more
            if(l.s.active || l.t.active) restLen = 120;
            var force = (dist - restLen) * 0.03;
            var fx = (dx/dist)*force; var fy = (dy/dist)*force;
            l.s.vx += fx; l.s.vy += fy; l.t.vx -= fx; l.t.vy -= fy;
        });

        nodes.forEach(n => {
            nodes.forEach(n2 => {
                if(n===n2) return;
                var dx = n.x - n2.x; var dy = n.y - n2.y;
                var dist = Math.sqrt(dx*dx + dy*dy) || 1;
                if(dist < 90) { // Keep them from overlapping
                    var f = (90-dist) * 0.05; 
                    n.vx += (dx/dist)*f; n.vy += (dy/dist)*f; 
                }
            });
            n.vx += (W/2 - n.x) * 0.015; // Pull to center
            n.vy += (H/2 - n.y) * 0.015;
            
            if(!n.dragging) { n.x += n.vx; n.y += n.vy; }
            n.vx *= 0.85; n.vy *= 0.85;
            
            n.x = Math.max(30, Math.min(W - 150, n.x));
            n.y = Math.max(30, Math.min(H - 30, n.y));
            if(n.el) n.el.setAttribute("transform", "translate("+n.x+","+n.y+")");
        });

        links.forEach(l => {
            if(l.el) {
                l.el.setAttribute("x1", l.s.x); l.el.setAttribute("y1", l.s.y);
                l.el.setAttribute("x2", l.t.x); l.el.setAttribute("y2", l.t.y);
            }
        });
        if(document.contains(el)) requestAnimationFrame(tick);
    }
    
    setTimeout(init, 100);
})();
</script>
</body>
</html>
</html>
