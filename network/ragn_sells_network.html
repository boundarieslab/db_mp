<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ragn-Sells Gardermoen - Master Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #fff; 
            font-family: 'IBM Plex Mono', monospace; 
        }

        #network-container svg { width: 100%; height: 100%; display: block; }
        #network-container { width: 100%; height: calc(100vh - 40px); display: block; position: relative; margin-top: 5px;}
        
        #single-line-legend {
            position: relative; width: 100%; height: 40px;
            background: #fff; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #000; border-bottom: 1px solid #f0f0f0; 
            box-sizing: border-box; gap: 20px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        .legend-section { display: flex; align-items: center; gap: 12px; }
        .legend-divider { width: 1px; height: 15px; background: #eee; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-item svg { width: 14px !important; height: 14px !important; flex-shrink: 0; overflow: visible; }

        .node-group, .link-line { transition: opacity 0.4s ease, stroke 0.4s ease; }
        .dimmed { opacity: 0.15 !important; }
        .highlight-link { stroke: #000 !important; stroke-width: 1.2 !important; opacity: 1 !important; }

        svg { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body>

<div id="single-line-legend">
    <div class="legend-section">
        <div class="legend-item"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" fill="#000"/></svg> Konsern</div>
        <div class="legend-item"><svg viewBox="0 0 14 14"><polygon points="7,1 13,13 1,13" fill="#666"/></svg> Divisjon (Ind)</div>
        <div class="legend-item"><svg viewBox="0 0 14 14"><polygon points="7,1 13,13 1,13" fill="none" stroke="#666" stroke-width="1.5"/></svg> Divisjon (Ent)</div>
        <div class="legend-item"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" fill="none" stroke="#666" stroke-width="1.5"/></svg> Søsteravd.</div>
    </div>
    <div class="legend-divider"></div>
    <div class="legend-section">
        <div class="legend-item">
            <svg viewBox="0 0 14 14">
                <circle cx="7" cy="7" r="6" fill="none" stroke="#39ff14" stroke-width="1.5"/>
                <path d="M1,7 A6,6 0 0,0 13,7 Z" fill="#000"/>
            </svg> 
            Receiving (Aktiv)
        </div>
    </div>
</div>

<div id="network-container"></div>

<script>
(function(){
    var containerID = "network-container"; 

    var NODES = [
        // KONSERN
        {id:"Ragn-Sells AB", type:"p", l:"(Sverige, Fam. Sellberg)"},
        
        // DIVISJON
        {id:"Ragn-Sells AS", type:"div_ind", l:"(Norge)"},
        
        // SØSTERAVDELINGER
        {id:"Retur Næring AS", type:"s"},
        {id:"Ragn-Sells Autoparts AS", type:"s", l:"(Bildeler)"},
        {id:"Nordstrand Steinbrudd AS", type:"s"},
        {id:"Ragn-Sells Havbruk AS", type:"s", l:"(Havbruk)"},
        {id:"Aquapro AS", type:"s"},
        {id:"Ocean Cleaning AS", type:"s"},
        
        // ACTIVE SITE
        {id:"Ragn-Sells Gardermoen", type:"receiving", active:true}
    ];
    
    var LINKS = [
        // Main chain
        ["Ragn-Sells AS", "Ragn-Sells AB"],
        ["Ragn-Sells Gardermoen", "Ragn-Sells AS"],
        
        // Direct subsidiaries under Ragn-Sells AS
        ["Retur Næring AS", "Ragn-Sells AS"],
        ["Ragn-Sells Autoparts AS", "Ragn-Sells AS"],
        ["Nordstrand Steinbrudd AS", "Ragn-Sells AS"],
        ["Ragn-Sells Havbruk AS", "Ragn-Sells AS"],
        
        // Havbruk sub-structure
        ["Aquapro AS", "Ragn-Sells Havbruk AS"],
        ["Ocean Cleaning AS", "Ragn-Sells Havbruk AS"]
    ];

    var el = document.getElementById(containerID);
    var W, H, svg, nodes=[], links=[], parentMap={}, childMap={};
    var time = 0;

    function getStrictLineage(startNode) {
        let pathNodes = new Set([startNode.id]);
        let pathLinks = new Set();
        let curr = startNode.id;
        while(parentMap[curr]) {
            pathLinks.add(curr + "-" + parentMap[curr]);
            curr = parentMap[curr];
            pathNodes.add(curr);
        }
        function findChildren(id) {
            if(childMap[id]) childMap[id].forEach(c => {
                pathNodes.add(c);
                pathLinks.add(c + "-" + id);
                findChildren(c);
            });
        }
        findChildren(startNode.id);
        return {nodes: pathNodes, links: pathLinks};
    }

    function createShape(type, isActive) {
        var ns = "http://www.w3.org/2000/svg";
        var g = document.createElementNS(ns, "g");
        var r = 3.5; 
        var p = 2;
        
        if (type === 'p') { 
            var bg = document.createElementNS(ns, "rect");
            bg.setAttribute("x", -(r+p)); bg.setAttribute("y", -(r+p));
            bg.setAttribute("width", (r+p)*2); bg.setAttribute("height", (r+p)*2);
            bg.setAttribute("fill", "#fff");
            g.appendChild(bg);
            var rect = document.createElementNS(ns, "rect");
            rect.setAttribute("x", -r); rect.setAttribute("y", -r);
            rect.setAttribute("width", r*2); rect.setAttribute("height", r*2);
            rect.setAttribute("fill", "#000");
            g.appendChild(rect);
        } else if (type === 'div_ind') { 
            var bg = document.createElementNS(ns, "polygon");
            bg.setAttribute("points", `0,-${r+1+p} ${r+1+p},${r+1+p} -${r+1+p},${r+1+p}`);
            bg.setAttribute("fill", "#fff");
            g.appendChild(bg);
            var poly = document.createElementNS(ns, "polygon");
            poly.setAttribute("points", `0,-${r+1} ${r+1},${r+1} -${r+1},${r+1}`);
            poly.setAttribute("fill", "#666");
            g.appendChild(poly);
        } else if (type === 'div_ent') { 
            var bg = document.createElementNS(ns, "polygon");
            bg.setAttribute("points", `0,-${r+1+p} ${r+1+p},${r+1+p} -${r+1+p},${r+1+p}`);
            bg.setAttribute("fill", "#fff");
            g.appendChild(bg);
            var poly = document.createElementNS(ns, "polygon");
            poly.setAttribute("points", `0,-${r+1} ${r+1},${r+1} -${r+1},${r+1}`);
            poly.setAttribute("fill", "none");
            poly.setAttribute("stroke", "#666"); 
            poly.setAttribute("stroke-width", "1");
            g.appendChild(poly);
        } else if (type === 's') { 
            var bg = document.createElementNS(ns, "rect");
            bg.setAttribute("x", -(r+p)); bg.setAttribute("y", -(r+p));
            bg.setAttribute("width", (r+p)*2); bg.setAttribute("height", (r+p)*2);
            bg.setAttribute("fill", "#fff");
            g.appendChild(bg);
            var rect = document.createElementNS(ns, "rect");
            rect.setAttribute("x", -r); rect.setAttribute("y", -r);
            rect.setAttribute("width", r*2); rect.setAttribute("height", r*2);
            rect.setAttribute("fill", "none");
            rect.setAttribute("stroke", "#666"); 
            rect.setAttribute("stroke-width", "1");
            g.appendChild(rect);
        } else if (type === 'receiving') { 
            var bg = document.createElementNS(ns, "circle");
            bg.setAttribute("r", r+p); bg.setAttribute("fill", "#fff");
            g.appendChild(bg);
            var c = document.createElementNS(ns, "circle");
            c.setAttribute("r", r); c.setAttribute("fill", "none");
            c.setAttribute("stroke", "#39ff14"); c.setAttribute("stroke-width", "1");
            var pa = document.createElementNS(ns, "path");
            pa.setAttribute("fill", "#000");
            pa.setAttribute("d", `M -${r} 0 A ${r} ${r} 0 0 0 ${r} 0 Z`);
            g.appendChild(c); g.appendChild(pa);
        }

        if(isActive) {
            g.setAttribute("transform", "scale(1.2)");
        }
        return g;
    }

    function init() {
        W = el.offsetWidth || window.innerWidth;
        H = el.offsetHeight || 500;
        el.innerHTML = "";
        var ns = "http://www.w3.org/2000/svg";
        svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        el.appendChild(svg);

        LINKS.forEach(l => {
            parentMap[l[0]] = l[1];
            if(!childMap[l[1]]) childMap[l[1]] = [];
            childMap[l[1]].push(l[0]);
        });

        nodes = NODES.map(d => ({
            ...d, x: W/2 + (Math.random()-0.5)*200, y: H/2 + (Math.random()-0.5)*200,
            vx: 0, vy: 0, noiseOffset: Math.random() * 100
        }));

        var linkG = document.createElementNS(ns, "g"); svg.appendChild(linkG);
        links = LINKS.map(l => {
            var sNode = nodes.find(n => n.id === l[0]), tNode = nodes.find(n => n.id === l[1]);
            var line = document.createElementNS(ns, "line");
            line.setAttribute("class", "link-line");
            line.setAttribute("stroke", "#f2f2f2"); line.setAttribute("stroke-width", "1");
            linkG.appendChild(line);
            return { s: sNode, t: tNode, el: line, id: l[0] + "-" + l[1] };
        });

        var nodeG = document.createElementNS(ns, "g"); svg.appendChild(nodeG);
        nodes.forEach(n => {
            var g = document.createElementNS(ns, "g");
            g.setAttribute("class", "node-group");
            g.style.cursor = "grab";

            var hit = document.createElementNS(ns, "circle");
            hit.setAttribute("r", 25); hit.setAttribute("fill", "transparent");
            g.appendChild(hit);
            
            var shape = createShape(n.type, n.active);
            shape.style.pointerEvents = "none";
            g.appendChild(shape); n.shapeEl = shape;
            
            var txt = document.createElementNS(ns, "text");
            txt.textContent = n.id + (n.l ? " " + n.l : "");
            txt.setAttribute("x", 12); txt.setAttribute("y", 3);
            txt.setAttribute("fill", n.active ? "#000" : "#bbb"); 
            txt.style.font = n.active ? "600 10px 'IBM Plex Mono'" : "400 9px 'IBM Plex Mono'"; 
            txt.style.pointerEvents = "none";
            g.appendChild(txt); n.tEl = txt;

            g.onmouseenter = () => {
                var lineage = getStrictLineage(n);
                nodes.forEach(node => { 
                    node.el.classList.toggle("dimmed", !lineage.nodes.has(node.id));
                    if(lineage.nodes.has(node.id)) {
                        node.tEl.style.fontWeight = "bold";
                        node.tEl.setAttribute("fill", "#000");
                    }
                });
                links.forEach(link => {
                    var isH = lineage.links.has(link.id);
                    link.el.classList.toggle("dimmed", !isH);
                    link.el.classList.toggle("highlight-link", isH);
                });
            };

            g.onmouseleave = () => {
                nodes.forEach(node => {
                    node.el.classList.remove("dimmed");
                    node.tEl.style.fontWeight = node.active ? "bold" : "normal";
                    node.tEl.setAttribute("fill", node.active ? "#000" : "#bbb");
                });
                links.forEach(link => link.el.classList.remove("dimmed", "highlight-link"));
            };

            g.onmousedown = (e) => { e.preventDefault(); n.dragging = true; g.style.cursor = "grabbing"; };
            nodeG.appendChild(g); n.el = g;
        });

        requestAnimationFrame(tick);
    }

    function tick() {
        time += 0.005;
        const restLen = 95, centerG = 0.01;
        links.forEach(l => {
            var dx = l.t.x - l.s.x, dy = l.t.y - l.s.y, dist = Math.sqrt(dx*dx + dy*dy) || 1;
            var force = (dist - restLen) * 0.02;
            l.s.vx += (dx/dist)*force; l.s.vy += (dy/dist)*force;
            l.t.vx -= (dx/dist)*force; l.t.vy -= (dy/dist)*force;
        });
        nodes.forEach(n => {
            if (!n.dragging) {
                n.vx += Math.sin(time + n.noiseOffset) * 0.04;
                n.vy += Math.cos(time + n.noiseOffset) * 0.04;
                n.vx += (W/2 - n.x) * centerG;
                n.vy += (H/2 - n.y) * centerG;
                nodes.forEach(n2 => {
                    if(n === n2) return;
                    var dx = n.x - n2.x, dy = n.y - n2.y, dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    if(dist < 100) { var f = (100 - dist) * 0.04; n.vx += (dx/dist) * f; n.vy += (dy/dist) * f; }
                });
                n.x += n.vx; n.y += n.vy; n.vx *= 0.88; n.vy *= 0.88;
            }
            n.x = Math.max(100, Math.min(W - 150, n.x)); n.y = Math.max(50, Math.min(H - 50, n.y));
            if(n.el) n.el.setAttribute("transform", `translate(${n.x},${n.y})`);
        });
        links.forEach(l => {
            l.el.setAttribute("x1", l.s.x); l.el.setAttribute("y1", l.s.y);
            l.el.setAttribute("x2", l.t.x); l.el.setAttribute("y2", l.t.y);
        });
        requestAnimationFrame(tick);
    }

    window.addEventListener("mousemove", (e) => {
        var rect = el.getBoundingClientRect();
        nodes.forEach(n => { if(n.dragging) { n.x = e.clientX - rect.left; n.y = e.clientY - rect.top; n.vx = 0; n.vy = 0; }});
    });
    window.addEventListener("mouseup", () => nodes.forEach(n => n.dragging = false));
    
    setTimeout(init, 500);
})();
</script>
</body>
</html>
