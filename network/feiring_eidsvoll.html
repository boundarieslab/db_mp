<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Feiring Dal - Interactive Network</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'IBM Plex Mono', monospace; }
        #feiring-dal-network { width: 100%; height: calc(100vh - 45px); display: block; position: relative; margin-top: 5px; }
        
        #single-line-legend {
            position: relative; width: 100%; height: 40px; background: #fff; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #000; border-bottom: 1px solid #f0f0f0; gap: 20px;
        }

        .node-group, .link-line { transition: opacity 0.4s ease, stroke 0.4s ease; }
        .dimmed { opacity: 0.1 !important; }
        .highlight-link { stroke: #000 !important; stroke-width: 1.2 !important; opacity: 1 !important; }
        
        svg { user-select: none; width: 100%; height: 100%; }
        .legend-item svg { width: 12px; height: 12px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="single-line-legend">
    <div style="display:flex; gap:15px; align-items:center; text-transform: uppercase; letter-spacing: 0.5px;">
        <div class="legend-item"><svg viewBox="0 0 10 10"><rect width="10" height="10" fill="#000"/></svg> Parent</div>
        <div class="legend-item"><svg viewBox="0 0 10 10"><rect width="10" height="10" fill="#3b82f6"/></svg> Operator</div>
        <div class="legend-item"><svg viewBox="0 0 10 10"><polygon points="0,10 5,0 10,10" fill="#ff9500"/></svg> Pukkverk</div>
        <div class="legend-item">
            <svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="none" stroke="#39ff14" stroke-width="1.5"/><path d="M1,6 A5,5 0 0,1 11,6 Z" fill="#000"/></svg> Active Site
        </div>
    </div>
</div>

<div id="feiring-dal-network"></div>

<script>
(function(){
    var containerID = "feiring-dal-network"; 
    var NODES = [
        {id:"Ollendorff Holding AS", t:"p"},
        {id:"Feiring AS", t:"p", l:"(Group)"},
        {id:"Feiring Bruk AS", t:"op"},
        {id:"Feiring Bruk AS avd Dal Pukkverk", t:"pukk", active:true},
        {id:"Grefsrud AS", t:"inactive", l:"(INAKTIVT)"},
        {id:"Bjønndalen Bruk AS", t:"inactive", l:"(INAKTIVT)"},
        {id:"Hjera Pukkverk AS", t:"inactive", l:"(INAKTIVT)"},
        {id:"Hadeland Pukkverk AS", t:"inactive", l:"(INAKTIVT)"},
        {id:"Feiring Vestfold AS", t:"pukk"},
        {id:"Feiring Asfalt AS", t:"s"},
        {id:"Lierfoss Transportsentral AS", t:"s"},
        {id:"Feiring Miljø AS", t:"mottak"},
        {id:"Tentex AS", t:"s"},
        {id:"Feiring Eiendomsinvest AS", t:"s"},
        {id:"Lundhs X Feiring Aggregates AS", t:"s"}
    ];
    
    var LINKS = [
        ["Feiring AS", "Ollendorff Holding AS"],
        ["Feiring Bruk AS", "Feiring AS"],
        ["Feiring Bruk AS avd Dal Pukkverk", "Feiring Bruk AS"],
        ["Grefsrud AS", "Feiring Bruk AS"],
        ["Bjønndalen Bruk AS", "Feiring Bruk AS"],
        ["Hjera Pukkverk AS", "Feiring Bruk AS"],
        ["Hadeland Pukkverk AS", "Feiring Bruk AS"],
        ["Feiring Vestfold AS", "Feiring AS"],
        ["Feiring Asfalt AS", "Feiring AS"],
        ["Lierfoss Transportsentral AS", "Feiring AS"],
        ["Feiring Miljø AS", "Feiring AS"],
        ["Tentex AS", "Feiring AS"],
        ["Feiring Eiendomsinvest AS", "Feiring AS"],
        ["Lundhs X Feiring Aggregates AS", "Feiring AS"]
    ];

    var COLORS = { p: "#000", s: "#e0e0e0", op: "#3b82f6", deponi: "#ff003c", pukk: "#ff9500", mottak: "#39ff14", inactive: "#fff" };

    var el = document.getElementById(containerID);
    var W, H, svg, nodes=[], links=[], parentMap={}, childMap={};
    var time = 0;

    function getStrictLineage(startNode) {
        let pathNodes = new Set([startNode.id]);
        let pathLinks = new Set();
        let curr = startNode.id;
        while(parentMap[curr]) {
            pathLinks.add(curr + "-" + parentMap[curr]);
            curr = parentMap[curr];
            pathNodes.add(curr);
        }
        function findChildren(id) {
            if(childMap[id]) childMap[id].forEach(c => {
                pathNodes.add(c);
                pathLinks.add(c + "-" + id);
                findChildren(c);
            });
        }
        findChildren(startNode.id);
        return {nodes: pathNodes, links: pathLinks};
    }

    function createShape(type, isActive) {
        var ns = "http://www.w3.org/2000/svg";
        var shape;
        if (type === 'p' || type === 'op' || type === 's' || type === 'inactive') {
            shape = document.createElementNS(ns, "rect");
            var size = type === 'p' ? 12 : 10;
            shape.setAttribute("x", -size/2); shape.setAttribute("y", -size/2);
            shape.setAttribute("width", size); shape.setAttribute("height", size);
            if(type === 'inactive') {
                shape.setAttribute("stroke", "#999"); shape.setAttribute("stroke-dasharray", "2,2");
            }
        } else if (type === 'pukk') {
            shape = document.createElementNS(ns, "polygon");
            shape.setAttribute("points", "-5,5 5,5 0,-5");
        } else {
            shape = document.createElementNS(ns, "polygon");
            shape.setAttribute("points", "0,-6 6,0 0,6 -6,0");
        }
        return shape;
    }

    function init() {
        W = el.offsetWidth || window.innerWidth;
        H = el.offsetHeight || 650;
        el.innerHTML = "";
        var ns = "http://www.w3.org/2000/svg";
        svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        el.appendChild(svg);

        LINKS.forEach(l => {
            parentMap[l[0]] = l[1];
            if(!childMap[l[1]]) childMap[l[1]] = [];
            childMap[l[1]].push(l[0]);
        });

        nodes = NODES.map(d => ({
            ...d, x: W/2 + (Math.random()-0.5)*200, y: H/2 + (Math.random()-0.5)*200,
            vx: 0, vy: 0, noiseOffset: Math.random() * 100
        }));

        var linkG = document.createElementNS(ns, "g"); svg.appendChild(linkG);
        links = LINKS.map(l => {
            var sNode = nodes.find(n => n.id === l[0]), tNode = nodes.find(n => n.id === l[1]);
            var line = document.createElementNS(ns, "line");
            line.setAttribute("class", "link-line");
            line.setAttribute("stroke", "#f2f2f2"); line.setAttribute("stroke-width", "1");
            linkG.appendChild(line);
            return { s: sNode, t: tNode, el: line };
        });

        var nodeG = document.createElementNS(ns, "g"); svg.appendChild(nodeG);
        nodes.forEach(n => {
            var g = document.createElementNS(ns, "g");
            g.setAttribute("class", "node-group");
            g.style.cursor = "grab";

            if (n.active) {
                var ring = document.createElementNS(ns, "circle");
                ring.setAttribute("r", 15); ring.setAttribute("fill", "none");
                ring.setAttribute("stroke", "#000"); ring.setAttribute("stroke-width", "0.5");
                ring.setAttribute("stroke-dasharray", "2,3");
                var anim = document.createElementNS(ns, "animateTransform");
                anim.setAttribute("attributeName", "transform"); anim.setAttribute("type", "rotate");
                anim.setAttribute("from", "0 0 0"); anim.setAttribute("to", "360 0 0");
                anim.setAttribute("dur", "20s"); anim.setAttribute("repeatCount", "indefinite");
                ring.appendChild(anim); g.appendChild(ring);
            }
            
            var shape = createShape(n.type, n.active);
            shape.setAttribute("fill", COLORS[n.type]);
            if(n.active) { shape.setAttribute("stroke", "#000"); shape.setAttribute("stroke-width", "1.5"); shape.setAttribute("transform", "scale(1.4)"); }
            else if(n.type !== 'inactive') { shape.setAttribute("stroke", "#fff"); shape.setAttribute("stroke-width", "1"); }
            
            g.appendChild(shape); n.shapeEl = shape;

            var txt = document.createElementNS(ns, "text");
            txt.textContent = n.id + (n.l ? " " + n.l : "");
            txt.setAttribute("x", 12); txt.setAttribute("y", 3);
            txt.setAttribute("fill", n.active ? "#000" : "#bbb"); 
            txt.style.font = n.active ? "bold 10px Helvetica" : "400 9px Helvetica"; 
            txt.style.pointerEvents = "none";
            g.appendChild(txt); n.tEl = txt;

            g.onmouseenter = () => {
                var lineage = getStrictLineage(n);
                nodes.forEach(node => { 
                    node.el.classList.toggle("dimmed", !lineage.nodes.has(node.id));
                    // Highlight with bold
                    if(lineage.nodes.has(node.id)) {
                        node.tEl.style.fontWeight = "bold";
                        node.tEl.setAttribute("fill", "#000");
                    }
                });
                links.forEach(link => {
                    var isH = lineage.links.has(link.s.id + "-" + link.t.id) || lineage.links.has(link.t.id + "-" + link.s.id);
                    link.el.classList.toggle("dimmed", !isH);
                    link.el.classList.toggle("highlight-link", isH);
                });
            };
            g.onmouseleave = () => {
                nodes.forEach(node => {
                    node.el.classList.remove("dimmed");
                    // Reset to original font weight
                    node.tEl.style.fontWeight = node.active ? "bold" : "normal";
                    node.tEl.setAttribute("fill", node.active ? "#000" : "#bbb");
                });
                links.forEach(link => link.el.classList.remove("dimmed", "highlight-link"));
            };
            g.onmousedown = (e) => { e.preventDefault(); n.dragging = true; g.style.cursor = "grabbing"; };
            nodeG.appendChild(g); n.el = g;
        });

        requestAnimationFrame(tick);
    }

    function tick() {
        time += 0.005;
        const restLen = 85, centerG = 0.008;
        links.forEach(l => {
            var dx = l.t.x - l.s.x, dy = l.t.y - l.s.y, dist = Math.sqrt(dx*dx + dy*dy) || 1;
            var force = (dist - restLen) * 0.02;
            l.s.vx += (dx/dist)*force; l.s.vy += (dy/dist)*force;
            l.t.vx -= (dx/dist)*force; l.t.vy -= (dy/dist)*force;
        });
        nodes.forEach(n => {
            if (!n.dragging) {
                n.vx += Math.sin(time + n.noiseOffset) * 0.04;
                n.vy += Math.cos(time + n.noiseOffset) * 0.04;
                n.vx += (W/2 - n.x) * centerG;
                n.vy += (H/2 - n.y) * centerG;
                nodes.forEach(n2 => {
                    if(n === n2) return;
                    var dx = n.x - n2.x, dy = n.y - n2.y, dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    if(dist < 100) { var f = (100 - dist) * 0.04; n.vx += (dx/dist) * f; n.vy += (dy/dist) * f; }
                });
                n.x += n.vx; n.y += n.vy; n.vx *= 0.88; n.vy *= 0.88;
            }
            n.x = Math.max(100, Math.min(W - 150, n.x)); n.y = Math.max(50, Math.min(H - 50, n.y));
            n.el.setAttribute("transform", `translate(${n.x},${n.y})`);
        });
        links.forEach(l => { l.el.setAttribute("x1", l.s.x); l.el.setAttribute("y1", l.s.y); l.el.setAttribute("x2", l.t.x); l.el.setAttribute("y2", l.t.y); });
        requestAnimationFrame(tick);
    }

    window.addEventListener("mousemove", (e) => {
        var rect = el.getBoundingClientRect();
        nodes.forEach(n => { if(n.dragging) { n.x = e.clientX - rect.left; n.y = e.clientY - rect.top; n.vx = 0; n.vy = 0; }});
    });
    window.addEventListener("mouseup", () => nodes.forEach(n => n.dragging = false));
    
    setTimeout(init, 400);
})();
</script>
</body>
</html>
