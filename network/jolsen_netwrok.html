<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Jølsen Miljøpark - Master Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #fff; 
            font-family: 'IBM Plex Mono', monospace; 
        }

        #network-container svg { width: 100%; height: 100%; display: block; }
        #network-container { width: 100%; height: calc(100vh - 45px); display: block; position: relative; margin-top: 5px;}
        
        #single-line-legend {
            position: relative; width: 100%; height: 40px;
            background: #fff; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: #000; border-bottom: 1px solid #f0f0f0; 
            box-sizing: border-box; gap: 15px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        .legend-section { display: flex; align-items: center; gap: 8px; }
        .legend-divider { width: 1px; height: 15px; background: #eee; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-item svg { width: 14px !important; height: 14px !important; flex-shrink: 0; }
        .legend-title { font-weight: 700; color: #999; margin-right: 4px;}

        /* Overganger for utheving */
        .node-group, .link-line { transition: opacity 0.4s ease, stroke 0.4s ease; }
        .dimmed { opacity: 0.1 !important; }
        .highlight-link { stroke: #000 !important; stroke-width: 1.2 !important; opacity: 1 !important; }

        svg { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body>

<div id="single-line-legend">
    <div class="legend-section">
        <div class="legend-item"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" fill="#000"/></svg> Konsern</div>
        <div class="legend-item"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" fill="#3b82f6"/></svg> Operatør</div>
        <div class="legend-item"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" fill="#e0e0e0" stroke="#000" stroke-width="0.5"/></svg> Sub / Gård</div>
    </div>
    <div class="legend-divider"></div>
    <div class="legend-section">
        <span class="legend-title">Facility:</span>
        <div class="legend-item">
            <svg viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="none" stroke="#39ff14" stroke-width="1.5"/><path d="M1,7 A6,6 0 0,0 13,7 Z" fill="#000"/></svg> Mottak (Rec)
        </div>
    </div>
</div>

<div id="network-container"></div>

<script>
(function(){
    var containerID = "network-container"; 

    var NODES = [
        {id:"AF Gruppen ASA", type:"parent", sub:"parent"},
        {id:"AF Decom AS", type:"parent", sub:"operator", l:"(Operator)"},
        {id:"Jølsen Gård", type:"parent", sub:"dept", l:"(Grunneier)"},
        
        {id:"Jølsen Miljøpark", type:"facility", sub:"receiving", active:true},
        {id:"Nes Miljøpark", type:"facility", sub:"receiving"},
        {id:"Rimol Miljøpark", type:"facility", sub:"receiving"},
        {id:"Børdalen Massemottak", type:"facility", sub:"receiving"},
        
        {id:"AF Anlegg", type:"parent", sub:"dept"},
        {id:"AF Bygg", type:"parent", sub:"dept"},
        {id:"AF Energi", type:"parent", sub:"dept"},
        {id:"AF Eiendom", type:"parent", sub:"dept"}
    ];
    
    // FORMAT: [Child, Parent]
    var LINKS = [
        ["AF Decom AS", "AF Gruppen ASA"],
        ["AF Anlegg", "AF Gruppen ASA"],
        ["AF Bygg", "AF Gruppen ASA"],
        ["AF Energi", "AF Gruppen ASA"],
        ["AF Eiendom", "AF Gruppen ASA"],
        
        ["Jølsen Miljøpark", "AF Decom AS"],
        ["Nes Miljøpark", "AF Decom AS"],
        ["Rimol Miljøpark", "AF Decom AS"],
        ["Børdalen Massemottak", "AF Decom AS"],
        
        // Landowner Connection (Second Parent to Jølsen)
        ["Jølsen Miljøpark", "Jølsen Gård"]
    ];

    var el = document.getElementById(containerID);
    var W, H, svg, nodes=[], links=[];
    var time = 0;

    // Ny sporing som takler at en node kan ha flere foreldre
    function getStrictLineage(startNode) {
        let pathNodes = new Set([startNode.id]);
        let pathLinks = new Set();
        
        // Spor oppover (Søk etter alle foreldre)
        let queue = [startNode];
        let visited = new Set([startNode.id]);
        while(queue.length > 0) {
            let curr = queue.shift();
            links.forEach(l => {
                if (l.s.id === curr.id) {
                    pathLinks.add(l.id);
                    pathNodes.add(l.t.id);
                    if (!visited.has(l.t.id)) {
                        visited.add(l.t.id);
                        queue.push(l.t);
                    }
                }
            });
        }

        // Spor nedover (Søk etter alle barn)
        function findChildren(node) {
            links.forEach(l => {
                if (l.t.id === node.id) {
                    pathNodes.add(l.s.id);
                    pathLinks.add(l.id);
                    if (!visited.has(l.s.id)) {
                        visited.add(l.s.id);
                        findChildren(l.s);
                    }
                }
            });
        }
        visited = new Set([startNode.id]); // Nullstill visited for nedover-søket
        findChildren(startNode);

        return {nodes: pathNodes, links: pathLinks};
    }

    function createIcon(node) {
        var ns = "http://www.w3.org/2000/svg";
        var g = document.createElementNS(ns, "g");
        var r = 6; 
        
        if (node.type === 'parent') {
            var rect = document.createElementNS(ns, "rect");
            rect.setAttribute("x", -r); rect.setAttribute("y", -r);
            rect.setAttribute("width", r*2); rect.setAttribute("height", r*2);
            rect.setAttribute("fill", node.sub === 'operator' ? "#3b82f6" : (node.sub === 'parent' ? "#000" : "#e0e0e0"));
            if (node.sub === 'dept') {
                rect.setAttribute("stroke", "#000"); 
                rect.setAttribute("stroke-width", "0.5");
            }
            g.appendChild(rect);
        } else if (node.type === 'construction') {
            var rect = document.createElementNS(ns, "rect");
            rect.setAttribute("x", -r); rect.setAttribute("y", -r);
            rect.setAttribute("width", r*2); rect.setAttribute("height", r*2);
            rect.setAttribute("fill", "none"); 
            rect.setAttribute("stroke", "#ff003c"); 
            rect.setAttribute("stroke-width", "1.5");
            
            var p = document.createElementNS(ns, "path");
            p.setAttribute("fill", "#000");
            
            if (node.sub === 'producing') {
                p.setAttribute("d", `M -${r} ${r} L ${r} ${r} L -${r} -${r} Z`); // Nederst-venstre
            } else if (node.sub === 'receiving') {
                p.setAttribute("d", `M -${r} -${r} L ${r} -${r} L -${r} ${r} Z`); // Øverst-venstre
            } else if (node.sub === 'mixed') {
                p.setAttribute("d", `M -${r} -${r} L 0 0 L -${r} ${r} Z M ${r} -${r} L ${r} ${r} L 0 0 Z`); // Venstre og Høyre
            }
            g.appendChild(rect); g.appendChild(p);
        } else { // Facility
            var c = document.createElementNS(ns, "circle");
            c.setAttribute("r", r); c.setAttribute("fill", "none");
            c.setAttribute("stroke", "#39ff14"); c.setAttribute("stroke-width", "1.5");
            
            var p = document.createElementNS(ns, "path");
            p.setAttribute("fill", "#000");
            
            if (node.sub === 'producing') {
                p.setAttribute("d", `M -${r} 0 A ${r} ${r} 0 0 1 ${r} 0 Z`); // Topp halvdel
            } else if (node.sub === 'receiving') {
                p.setAttribute("d", `M -${r} 0 A ${r} ${r} 0 0 0 ${r} 0 Z`); // Bunn halvdel
            } else if (node.sub === 'mixed') {
                p.setAttribute("d", `M -${r} 0 A ${r} ${r} 0 0 1 0 -${r} L 0 0 Z M 0 0 L ${r} 0 A ${r} ${r} 0 0 1 0 ${r} Z`); // Sjakkbrett
            }
            g.appendChild(c); g.appendChild(p);
        }
        return g;
    }

    function init() {
        W = el.offsetWidth || window.innerWidth;
        H = el.offsetHeight || 500;
        el.innerHTML = "";
        var ns = "http://www.w3.org/2000/svg";
        svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        el.appendChild(svg);

        nodes = NODES.map(d => ({
            ...d, x: W/2 + (Math.random()-0.5)*200, y: H/2 + (Math.random()-0.5)*200,
            vx: 0, vy: 0, noiseOffset: Math.random() * 100
        }));

        var linkG = document.createElementNS(ns, "g"); svg.appendChild(linkG);
        links = LINKS.map(l => {
            var sNode = nodes.find(n => n.id === l[0]), tNode = nodes.find(n => n.id === l[1]);
            var line = document.createElementNS(ns, "line");
            line.setAttribute("class", "link-line");
            line.setAttribute("stroke", "#f2f2f2"); line.setAttribute("stroke-width", "1");
            linkG.appendChild(line);
            return { s: sNode, t: tNode, el: line, id: l[0] + "-" + l[1] };
        });

        var nodeG = document.createElementNS(ns, "g"); svg.appendChild(nodeG);
        nodes.forEach(n => {
            var g = document.createElementNS(ns, "g");
            g.setAttribute("class", "node-group");
            g.style.cursor = "grab";

            var hit = document.createElementNS(ns, "circle");
            hit.setAttribute("r", 25); hit.setAttribute("fill", "transparent");
            g.appendChild(hit);

            if (n.active) {
                var ring = document.createElementNS(ns, "circle");
                ring.setAttribute("r", 17); ring.setAttribute("fill", "none");
                ring.setAttribute("stroke", "#000"); ring.setAttribute("stroke-width", "0.5");
                ring.setAttribute("stroke-dasharray", "2,3");
                var anim = document.createElementNS(ns, "animateTransform");
                anim.setAttribute("attributeName", "transform"); anim.setAttribute("type", "rotate");
                anim.setAttribute("from", "0 0 0"); anim.setAttribute("to", "360 0 0");
                anim.setAttribute("dur", "20s"); anim.setAttribute("repeatCount", "indefinite");
                ring.appendChild(anim); g.appendChild(ring);
            }
            
            var icon = createIcon(n); icon.style.pointerEvents = "none";
            g.appendChild(icon); n.shapeEl = icon;
            
            var txt = document.createElementNS(ns, "text");
            txt.textContent = n.id + (n.l ? " " + n.l : "");
            txt.setAttribute("x", 12); txt.setAttribute("y", 3);
            txt.setAttribute("fill", n.active ? "#000" : "#bbb"); 
            txt.style.font = n.active ? "600 10px 'IBM Plex Mono'" : "400 9px 'IBM Plex Mono'"; 
            txt.style.pointerEvents = "none";
            g.appendChild(txt); n.tEl = txt;

            g.onmouseenter = () => {
                var lineage = getStrictLineage(n);
                nodes.forEach(node => { 
                    node.el.classList.toggle("dimmed", !lineage.nodes.has(node.id));
                    if(lineage.nodes.has(node.id)) {
                        node.tEl.style.fontWeight = "bold";
                        node.tEl.setAttribute("fill", "#000");
                    }
                });
                links.forEach(link => {
                    var isH = lineage.links.has(link.id);
                    link.el.classList.toggle("dimmed", !isH);
                    link.el.classList.toggle("highlight-link", isH);
                });
            };

            g.onmouseleave = () => {
                nodes.forEach(node => {
                    node.el.classList.remove("dimmed");
                    node.tEl.style.fontWeight = node.active ? "bold" : "normal";
                    node.tEl.setAttribute("fill", node.active ? "#000" : "#bbb");
                });
                links.forEach(link => link.el.classList.remove("dimmed", "highlight-link"));
            };

            g.onmousedown = (e) => { e.preventDefault(); n.dragging = true; g.style.cursor = "grabbing"; };
            nodeG.appendChild(g); n.el = g;
        });

        requestAnimationFrame(tick);
    }

    function tick() {
        time += 0.005;
        const restLen = 95, centerG = 0.01;
        links.forEach(l => {
            var dx = l.t.x - l.s.x, dy = l.t.y - l.s.y, dist = Math.sqrt(dx*dx + dy*dy) || 1;
            var force = (dist - restLen) * 0.02;
            l.s.vx += (dx/dist)*force; l.s.vy += (dy/dist)*force;
            l.t.vx -= (dx/dist)*force; l.t.vy -= (dy/dist)*force;
        });
        nodes.forEach(n => {
            if (!n.dragging) {
                n.vx += Math.sin(time + n.noiseOffset) * 0.04;
                n.vy += Math.cos(time + n.noiseOffset) * 0.04;
                n.vx += (W/2 - n.x) * centerG;
                n.vy += (H/2 - n.y) * centerG;
                nodes.forEach(n2 => {
                    if(n === n2) return;
                    var dx = n.x - n2.x, dy = n.y - n2.y, dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    if(dist < 100) { var f = (100 - dist) * 0.04; n.vx += (dx/dist) * f; n.vy += (dy/dist) * f; }
                });
                n.x += n.vx; n.y += n.vy; n.vx *= 0.88; n.vy *= 0.88;
            }
            n.x = Math.max(100, Math.min(W - 150, n.x)); n.y = Math.max(50, Math.min(H - 50, n.y));
            if(n.el) n.el.setAttribute("transform", `translate(${n.x},${n.y})`);
        });
        links.forEach(l => {
            l.el.setAttribute("x1", l.s.x); l.el.setAttribute("y1", l.s.y);
            l.el.setAttribute("x2", l.t.x); l.el.setAttribute("y2", l.t.y);
        });
        requestAnimationFrame(tick);
    }

    window.addEventListener("mousemove", (e) => {
        var rect = el.getBoundingClientRect();
        nodes.forEach(n => { if(n.dragging) { n.x = e.clientX - rect.left; n.y = e.clientY - rect.top; n.vx = 0; n.vy = 0; }});
    });
    window.addEventListener("mouseup", () => nodes.forEach(n => n.dragging = false));
    
    setTimeout(init, 500);
})();
</script>
</body>
</html>
