<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dal Skog ØRAS Network</title>

<!-- IBM Plex Mono -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fff;
    font-family: "IBM Plex Mono", monospace;
}
#network-container {
    width: 100%;
    height: 100vh;
    display: block;
    position: relative;
}
</style>
</head>

<body>

<div id="network-container"></div>

<script>
(function(){

var NODES = [
    {id:"Eidsvoll Kommune", t:"p"},
    {id:"Hurdal Kommune", t:"p"},
    {id:"Nannestad Kommune", t:"p"},
    {id:"Ullensaker Kommune", t:"p"},

    {id:"Øvre Romerike Avfallsselskap IKS", t:"op", l:"(ØRAS)"},
    {id:"Miljøstasjon Dal Skog", t:"mottak", active:true}
];

var LINKS = [
    ["Øvre Romerike Avfallsselskap IKS", "Eidsvoll Kommune"],
    ["Øvre Romerike Avfallsselskap IKS", "Hurdal Kommune"],
    ["Øvre Romerike Avfallsselskap IKS", "Nannestad Kommune"],
    ["Øvre Romerike Avfallsselskap IKS", "Ullensaker Kommune"],
    ["Miljøstasjon Dal Skog", "Øvre Romerike Avfallsselskap IKS"]
];

var COLORS = {
    p: "#000",
    op: "#3b82f6",
    mottak: "#39ff14"
};

var el = document.getElementById("network-container");
var W, H, svg, nodes=[], links=[];

function createShape(type, isActive) {
    var ns = "http://www.w3.org/2000/svg";
    var shape;

    if (type === 'p') {
        shape = document.createElementNS(ns, "rect");
        shape.setAttribute("x", -4);
        shape.setAttribute("y", -4);
        shape.setAttribute("width", 8);
        shape.setAttribute("height", 8);

    } else if (type === 'op') {
        shape = document.createElementNS(ns, "rect");
        shape.setAttribute("x", -3.5);
        shape.setAttribute("y", -3.5);
        shape.setAttribute("width", 7);
        shape.setAttribute("height", 7);

    } else if (type === 'mottak') {
        shape = document.createElementNS(ns, "polygon");
        shape.setAttribute("points", "0,-4 4,0 0,4 -4,0");

    } else {
        shape = document.createElementNS(ns, "circle");
        shape.setAttribute("r", 3);
    }

    if(isActive) shape.setAttribute("transform", "scale(1.25)");
    return shape;
}

function init(){

    W = el.offsetWidth;
    H = el.offsetHeight;

    var ns = "http://www.w3.org/2000/svg";
    svg = document.createElementNS(ns, "svg");
    svg.setAttribute("width","100%");
    svg.setAttribute("height","100%");
    svg.setAttribute("viewBox","0 0 "+W+" "+H);
    el.appendChild(svg);

    nodes = NODES.map(d => ({
        id:d.id,
        type:d.t,
        label:d.l,
        active:d.active,
        x:W/2 + (Math.random()-0.5)*80,
        y:H/2 + (Math.random()-0.5)*80,
        vx:0, vy:0
    }));

    LINKS.forEach(pair=>{
        var s = nodes.find(n=>n.id===pair[0]);
        var t = nodes.find(n=>n.id===pair[1]);
        if(s && t) links.push({s:s,t:t});
    });

    var linkG = document.createElementNS(ns,"g");
    svg.appendChild(linkG);

    links.forEach(l=>{
        var line = document.createElementNS(ns,"line");
        line.setAttribute("stroke","#bbb");
        line.setAttribute("stroke-width","0.6");
        line.setAttribute("stroke-linecap","round");
        line.setAttribute("opacity","0.8");
        linkG.appendChild(line);
        l.el = line;
    });

    var nodeG = document.createElementNS(ns,"g");
    svg.appendChild(nodeG);

    nodes.forEach(n=>{
        var g = document.createElementNS(ns,"g");

        if(n.active){
            var ring = document.createElementNS(ns,"circle");
            ring.setAttribute("r",14);
            ring.setAttribute("fill","none");
            ring.setAttribute("stroke","#000");
            ring.setAttribute("stroke-width","0.6");
            ring.setAttribute("stroke-dasharray","1.5,2");
            g.appendChild(ring);
        }

        var shape = createShape(n.type,n.active);
        shape.setAttribute("fill", COLORS[n.type] || "#999");
        shape.setAttribute("stroke","#fff");
        shape.setAttribute("stroke-width", n.active ? "1" : "0.6");
        g.appendChild(shape);

        var txt = document.createElementNS(ns,"text");
        var label = n.id + (n.label ? " " + n.label : "");
        txt.textContent = label;

        txt.setAttribute("x",8);
        txt.setAttribute("y",2);
        txt.setAttribute("fill", n.active ? "#000" : "#666");
        txt.setAttribute("letter-spacing","0.3px");

        txt.style.font = n.active
            ? "500 9px 'IBM Plex Mono'"
            : "400 8px 'IBM Plex Mono'";

        g.appendChild(txt);

        n.el = g;

        nodeG.appendChild(g);
    });

    requestAnimationFrame(tick);
}

function tick(){

    links.forEach(l=>{
        var dx=l.t.x-l.s.x, dy=l.t.y-l.s.y;
        var dist=Math.sqrt(dx*dx+dy*dy)||1;
        var restLen=45;
        var force=(dist-restLen)*0.05;

        var fx=(dx/dist)*force;
        var fy=(dy/dist)*force;

        l.s.vx+=fx; l.s.vy+=fy;
        l.t.vx-=fx; l.t.vy-=fy;
    });

    nodes.forEach(n=>{
        nodes.forEach(n2=>{
            if(n===n2) return;
            var dx=n.x-n2.x, dy=n.y-n2.y;
            var dist=Math.sqrt(dx*dx+dy*dy)||1;
            if(dist<80){
                var f=(80-dist)*0.05;
                n.vx+=(dx/dist)*f;
                n.vy+=(dy/dist)*f;
            }
        });

        n.vx+=(W/2-n.x)*0.02;
        n.vy+=(H/2-n.y)*0.02;

        n.x+=n.vx;
        n.y+=n.vy;
        n.vx*=0.85;
        n.vy*=0.85;

        n.el.setAttribute("transform","translate("+n.x+","+n.y+")");
    });

    links.forEach(l=>{
        l.el.setAttribute("x1",l.s.x);
        l.el.setAttribute("y1",l.s.y);
        l.el.setAttribute("x2",l.t.x);
        l.el.setAttribute("y2",l.t.y);
    });

    requestAnimationFrame(tick);
}

init();

})();
</script>

</body>
</html>
