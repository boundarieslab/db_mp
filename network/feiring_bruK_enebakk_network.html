<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Feiring Network - Spatial Agency Style</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'IBM Plex Mono', monospace; }
        
        #network-container { width: 100%; height: calc(100vh - 40px); display: block; position: relative; }
        
        #single-line-legend {
            position: relative; width: 100%; height: 40px; background: #fff; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #000; border-bottom: 1px solid #f0f0f0; gap: 20px;
        }

        /* Myke overganger for utheving */
        .node-group, .link-line { transition: opacity 0.4s ease, stroke 0.4s ease; }
        .dimmed { opacity: 0.15 !important; }
        .highlight-link { stroke: #000 !important; stroke-width: 1.2 !important; opacity: 1 !important; }
        .highlight-node { opacity: 1 !important; }
        
        svg { user-select: none; width: 100%; height: 100%; }
        .legend-item svg { width: 12px; height: 12px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="single-line-legend">
    <div class="legend-section" style="display:flex; gap:15px;">
        <div class="legend-item"><svg viewBox="0 0 10 10"><rect width="10" height="10" fill="#000"/></svg> Konsern</div>
        <div class="legend-item"><svg viewBox="0 0 10 10"><polygon points="0,10 5,0 10,10" fill="#666"/></svg> Divisjon</div>
        <div class="legend-item">
            <svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="none" stroke="#39ff14" stroke-width="1.5"/><path d="M1,6 A5,5 0 0,1 11,6 Z" fill="#000"/></svg> Producing (Aktiv)
        </div>
    </div>
</div>

<div id="network-container"></div>

<script>
(function(){
    const DATA = {
        nodes: [
            {id:"Ollendorff Holding AS", type:"p", sub:"parent"},
            {id:"Feiring AS", type:"p", sub:"parent"},
            {id:"Feiring Bruk AS", type:"p", sub:"div"},
            {id:"Feiring Bruk Enebakk", type:"f", sub:"prod", active:true},
            {id:"Bjønndalen Pukkverk", type:"f", sub:"prod"},
            {id:"Lørenskog Pukkverk", type:"f", sub:"prod"},
            {id:"Feiring Miljø AS", type:"p", sub:"dept"},
            {id:"Feiring Asfalt AS", type:"p", sub:"dept"}
        ],
        links: [
            {s:"Feiring AS", t:"Ollendorff Holding AS"},
            {s:"Feiring Bruk AS", t:"Feiring AS"},
            {s:"Feiring Bruk Enebakk", t:"Feiring Bruk AS"},
            {s:"Bjønndalen Pukkverk", t:"Feiring Bruk AS"},
            {s:"Lørenskog Pukkverk", t:"Feiring Bruk AS"},
            {s:"Feiring Miljø AS", t:"Feiring AS"},
            {s:"Feiring Asfalt AS", t:"Feiring AS"}
        ]
    };

    const container = document.getElementById("network-container");
    let W, H, svg, nodes = [], links = [], parentMap = {}, childMap = {};
    let time = 0;

    function createIcon(node) {
        const ns = "http://www.w3.org/2000/svg";
        const g = document.createElementNS(ns, "g");
        const s = 4.5;
        
        if (node.type === 'p') {
            const shape = node.sub === 'parent' ? document.createElementNS(ns, "rect") : document.createElementNS(ns, "polygon");
            if(node.sub === 'parent') {
                shape.setAttribute("x", -s); shape.setAttribute("y", -s);
                shape.setAttribute("width", s*2); shape.setAttribute("height", s*2);
                shape.setAttribute("fill", "#000");
            } else {
                shape.setAttribute("points", `0,-${s+1} ${s+1},${s+1} -${s+1},${s+1}`);
                shape.setAttribute("fill", "#666");
            }
            g.appendChild(shape);
        } else {
            const c = document.createElementNS(ns, "circle");
            c.setAttribute("r", s+1); c.setAttribute("fill", "none");
            c.setAttribute("stroke", "#39ff14"); c.setAttribute("stroke-width", "1.3");
            const p = document.createElementNS(ns, "path");
            p.setAttribute("fill", "#000");
            p.setAttribute("d", `M-${s+1},0 A${s+1},${s+1} 0 0,1 ${s+1},0 Z`);
            g.appendChild(c); g.appendChild(p);
        }
        return g;
    }

    function init() {
        W = container.offsetWidth || window.innerWidth;
        H = container.offsetHeight || 600;
        const ns = "http://www.w3.org/2000/svg";
        svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        container.appendChild(svg);

        DATA.links.forEach(l => {
            parentMap[l.s] = l.t;
            if(!childMap[l.t]) childMap[l.t] = [];
            childMap[l.t].push(l.s);
        });

        nodes = DATA.nodes.map(d => ({
            ...d, 
            x: W/2 + (Math.random()-0.5)*150, 
            y: H/2 + (Math.random()-0.5)*150,
            vx: 0, vy: 0, noiseOffset: Math.random() * 100
        }));

        const linkG = document.createElementNS(ns, "g");
        const nodeG = document.createElementNS(ns, "g");
        svg.appendChild(linkG); svg.appendChild(nodeG);

        links = DATA.links.map(l => {
            const line = document.createElementNS(ns, "line");
            line.setAttribute("class", "link-line");
            line.setAttribute("stroke", "#f0f0f0");
            line.setAttribute("stroke-width", "0.8");
            linkG.appendChild(line);
            return { s: nodes.find(n => n.id === l.s), t: nodes.find(n => n.id === l.t), el: line };
        });

        nodes.forEach(n => {
            const g = document.createElementNS(ns, "g");
            g.setAttribute("class", "node-group");
            g.style.cursor = "grab";

            const hit = document.createElementNS(ns, "circle");
            hit.setAttribute("r", 20); hit.setAttribute("fill", "transparent");
            g.appendChild(hit);

            if (n.active) {
                const ring = document.createElementNS(ns, "circle");
                ring.setAttribute("r", 15); ring.setAttribute("fill", "none");
                ring.setAttribute("stroke", "#000"); ring.setAttribute("stroke-width", "0.5");
                ring.setAttribute("stroke-dasharray", "2,3");
                const anim = document.createElementNS(ns, "animateTransform");
                anim.setAttribute("attributeName", "transform"); anim.setAttribute("type", "rotate");
                anim.setAttribute("from", "0 0 0"); anim.setAttribute("to", "360 0 0");
                anim.setAttribute("dur", "20s"); anim.setAttribute("repeatCount", "indefinite");
                ring.appendChild(anim); g.appendChild(ring);
            }

            const icon = createIcon(n); icon.style.pointerEvents = "none";
            g.appendChild(icon); n.shapeEl = icon;
            
            const txt = document.createElementNS(ns, "text");
            txt.textContent = n.id; txt.setAttribute("x", 10); txt.setAttribute("y", 3);
            txt.setAttribute("fill", n.active ? "#000" : "#999");
            txt.style.font = n.active ? "600 10px 'IBM Plex Mono'" : "400 9px 'IBM Plex Mono'";
            txt.style.pointerEvents = "none";
            g.appendChild(txt); n.tEl = txt;

            g.onmouseenter = () => highlightChain(n);
            g.onmouseleave = () => resetHighlight();
            g.onmousedown = (e) => { e.preventDefault(); n.dragging = true; g.style.cursor = "grabbing"; };

            nodeG.appendChild(g); n.el = g;
        });

        requestAnimationFrame(tick);
    }

    function highlightChain(startNode) {
        const chain = new Set([startNode.id]);
        let curr = startNode.id;
        while(parentMap[curr]) { chain.add(parentMap[curr]); curr = parentMap[curr]; }
        function findChildren(id) {
            if(childMap[id]) childMap[id].forEach(c => { chain.add(c); findChildren(c); });
        }
        findChildren(startNode.id);

        nodes.forEach(n => n.el.classList.toggle("dimmed", !chain.has(n.id)));
        links.forEach(l => {
            const isActive = chain.has(l.s.id) && chain.has(l.t.id);
            l.el.classList.toggle("dimmed", !isActive);
            l.el.classList.toggle("highlight-link", isActive);
        });
    }

    function resetHighlight() {
        nodes.forEach(n => n.el.classList.remove("dimmed"));
        links.forEach(l => l.el.classList.remove("dimmed", "highlight-link"));
    }

    function tick() {
        time += 0.005; // Veldig rolig tidsflyt
        const K = 0.02;         
        const restLen = 85;     // Balansert avstand (Spatial Agency-stil)
        const centerG = 0.008;  // Holder klyngen samlet
        const friction = 0.88;  

        links.forEach(l => {
            const dx = l.t.x - l.s.x, dy = l.t.y - l.s.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            const force = (dist - restLen) * K;
            l.s.vx += (dx/dist)*force; l.s.vy += (dy/dist)*force;
            l.t.vx -= (dx/dist)*force; l.t.vy -= (dy/dist)*force;
        });

        nodes.forEach(n => {
            if (!n.dragging) {
                // Myk "underwater" bevegelse istedenfor risting
                n.vx += Math.sin(time + n.noiseOffset) * 0.04;
                n.vy += Math.cos(time + n.noiseOffset) * 0.04;

                // Dra mot midten
                n.vx += (W/2 - n.x) * centerG;
                n.vy += (H/2 - n.y) * centerG;

                // Repulsjon mellom noder
                nodes.forEach(n2 => {
                    if(n === n2) return;
                    const dx = n.x - n2.x, dy = n.y - n2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    if(dist < 100) {
                        const repulse = (100 - dist) * 0.04;
                        n.vx += (dx/dist) * repulse;
                        n.vy += (dy/dist) * repulse;
                    }
                });

                n.x += n.vx; n.y += n.vy;
                n.vx *= friction; n.vy *= friction;
            }

            // Marginer mot kanten
            n.x = Math.max(80, Math.min(W - 120, n.x));
            n.y = Math.max(50, Math.min(H - 50, n.y));
            n.el.setAttribute("transform", `translate(${n.x},${n.y})`);
        });

        links.forEach(l => {
            l.el.setAttribute("x1", l.s.x); l.el.setAttribute("y1", l.s.y);
            l.el.setAttribute("x2", l.t.x); l.el.setAttribute("y2", l.t.y);
        });
        requestAnimationFrame(tick);
    }

    window.addEventListener("mousemove", (e) => {
        const rect = container.getBoundingClientRect();
        nodes.forEach(n => { if(n.dragging) { n.x = e.clientX - rect.left; n.y = e.clientY - rect.top; n.vx = 0; n.vy = 0; }});
    });
    window.addEventListener("mouseup", () => nodes.forEach(n => {
        if(n.dragging) { n.dragging = false; n.el.style.cursor = "grab"; }
    }));
    
    setTimeout(init, 400);
})();
</script>
</body>
</html>
